name: hedera-demo-from-main
description: Blind generation of a Hedera-native Proof Wall demo template from scaffold-hbar main.

prd: docs/prds/hedera-proof-wall-demo.md
contract: contracts/proof-wall-acceptance.json

seed:
  repo: /Users/sebastianraba/Work/scaffold-hbar
  ref: main
  preflight:
    commands:
      - name: seed-install
        command: yarn install
        timeoutMs: 300000
  isolation:
    neverModifySeedRepo: true

generator:
  provider: command
  command: agent
  args:
    - -p
    - --trust
    - --sandbox
    - enabled
    - --workspace
    - "{workspace}"
    - --model
    - composer-2.5
    - --force
    - --output-format
    - stream-json
    - --stream-partial-output
  timeoutMs: 3600000

skills:
  - /Users/sebastianraba/Work/hedera-skills/plugins/dev-intelligence/skills/project-scaffolding/SKILL.md
  - /Users/sebastianraba/Work/hedera-skills/plugins/dev-intelligence/skills/quality-gates/SKILL.md
  - /Users/sebastianraba/Work/hedera-skills/plugins/dev-intelligence/skills/session-management/SKILL.md
  - /Users/sebastianraba/Work/hedera-skills/plugins/native-services-js/skills/hedera-consensus-service/SKILL.md
  - /Users/sebastianraba/Work/hedera-skills/plugins/native-services-js/skills/hedera-token-service/SKILL.md

constraints:
  packageManager: yarn@3.2.3
  workspaces:
    - packages/nextjs
  forbiddenWorkspaces:
    - packages/hardhat
    - packages/foundry
  forbiddenCommands:
    - npm install
    - npm run
    - pnpm install
    - pnpm run
    - yarn hardhat:*
    - yarn foundry:*
    - docker *

templateMetadata:
  name: proof-wall-demo
  frontend: nextjs-app
  solidityFramework: none

validators:
  static: validators/blind-hedera-demo-static.json
  commands: validators/hedera-demo-yarn-validation.json
  playwright: playwright/hedera-demo-smoke.yaml

requiredFiles:
  - template.json
  - README.md
  - AGENTS.md
  - package.json
  - packages/nextjs/package.json

forbiddenFiles:
  - .env
  - packages/nextjs/.env
  - packages/hardhat
  - packages/foundry

secretScan:
  failOnFiles:
    - .env
    - packages/nextjs/.env
  patterns:
    - name: private-key-assignment
      pattern: "(PRIVATE_KEY|OPERATOR_KEY|HEDERA_OPERATOR_PRIVATE_KEY)\\s*=\\s*(0x)?[0-9a-fA-F]{32,}"
    - name: api-key-assignment
      pattern: "(API_KEY|TOKEN|SECRET)\\s*=\\s*['\\\"]?[A-Za-z0-9_\\-]{24,}"

maxAttempts: 3

logging:
  jsonl: runs/harness.log.jsonl
  notes: runs/harness-notes.md
