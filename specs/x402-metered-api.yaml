name: x402-metered-api
description: Blind generation of an x402 keyless metered API demo template from scaffold-hbar main.

prd: docs/prds/x402-metered-api.md
contract: contracts/x402-metered-api-acceptance.json

seed:
  repo: /Users/sebastianraba/Work/scaffold-hbar
  ref: main
  preflight:
    commands:
      - name: seed-install
        command: yarn install
        timeoutMs: 300000
  isolation:
    neverModifySeedRepo: true

generator:
  provider: command
  command: agent
  args:
    - -p
    - --trust
    - --sandbox
    - enabled
    - --workspace
    - "{workspace}"
    - --model
    - composer-2.5
    - --force
    - --output-format
    - stream-json
    - --stream-partial-output
  timeoutMs: 3600000

validator:
  enabled: true
  provider: command
  command: agent
  args:
    - -p
    - --trust
    - --force
    - --sandbox
    - disabled
    - --approve-mcps
    - --workspace
    - "{workspace}"
    - --model
    - composer-2.5
    - --output-format
    - stream-json
    - --stream-partial-output
  timeoutMs: 600000

skills:
  - /Users/sebastianraba/Work/hedera-skills/plugins/dev-intelligence/skills/project-scaffolding/SKILL.md
  - /Users/sebastianraba/Work/hedera-skills/plugins/dev-intelligence/skills/quality-gates/SKILL.md
  - /Users/sebastianraba/Work/hedera-skills/plugins/dev-intelligence/skills/session-management/SKILL.md
  - /Users/sebastianraba/Work/hedera-skills/plugins/native-services-js/skills/hedera-consensus-service/SKILL.md

constraints:
  packageManager: yarn@3.2.3
  workspaces:
    - packages/nextjs
  forbiddenWorkspaces:
    - packages/hardhat
    - packages/foundry
  forbiddenCommands:
    - npm install
    - npm run
    - pnpm install
    - pnpm run
    - yarn hardhat:*
    - yarn foundry:*
    - docker *

templateMetadata:
  name: x402-metered-api
  frontend: nextjs-app
  solidityFramework: none

validators:
  static: validators/x402-metered-api-static.json
  commands: validators/x402-metered-api-yarn.json
  playwright: playwright/x402-metered-api-smoke.yaml

requiredFiles:
  - template.json
  - README.md
  - AGENTS.md
  - package.json
  - packages/nextjs/package.json

forbiddenFiles:
  - .env
  - packages/nextjs/.env
  - packages/hardhat
  - packages/foundry

secretScan:
  failOnFiles:
    - .env
    - packages/nextjs/.env
  patterns:
    - name: private-key-assignment
      pattern: "(PRIVATE_KEY|OPERATOR_KEY|HEDERA_OPERATOR_PRIVATE_KEY)\\s*=\\s*(0x)?[0-9a-fA-F]{32,}"
    - name: api-key-assignment
      pattern: "(API_KEY|TOKEN|SECRET)\\s*=\\s*['\\\"]?[A-Za-z0-9_\\-]{24,}"

# Tier 3.5 — on-chain validation via ephemeral ECDSA test signer + mirror node.
# Requires host env: HEDERA_OPERATOR_ID and HEDERA_OPERATOR_KEY (testnet ECDSA).
chainValidation:
  enabled: true
  network: testnet
  operator:
    accountIdEnv: HEDERA_OPERATOR_ID
    privateKeyEnv: HEDERA_OPERATOR_KEY
  fundingHbar: 10
  sweepBack: true
  expose:
    browserLocalStorageKey: burnerWallet.pk
    envVars: []

maxAttempts: 3

logging:
  jsonl: runs/harness.log.jsonl
  notes: runs/harness-notes.md
