name: hedera-demo-smoke
description: Wallet-free browser smoke checks for the hedera-demo baseline template.

server:
  command: yarn next:dev
  url: http://localhost:3000
  timeoutMs: 120000

artifacts:
  screenshots: true
  traces: true
  consoleErrors: true

defaults:
  timeoutMs: 30000
  failOnConsoleError: true
  requiresWallet: false
  requiresSecrets: false

routes:
  - name: proof-wall
    path: /
    assertions:
      visibleText:
        - Proof Wall
        - Hedera Testnet
        - Active Topic
        - Post a proof
      selectors:
        - "section[aria-label='Submit a proof']"
        - "section[aria-label='Proof feed']"

  - name: admin
    path: /admin
    assertions:
      visibleText:
        - Admin
        - Create HCS topic
        - Create HTS badge token
        - Current app config
        - Connect a Hedera wallet to create topics and tokens.
      selectors:
        - "#admin-topic-heading"
        - "#admin-token-heading"
        - "#admin-config-heading"

  - name: my-proofs
    path: /my-proofs
    assertions:
      visibleText:
        - My Proofs
        - Connect your wallet
        - Your proofs and badge balance will appear here.

forbidden:
  visibleText:
    - Internal Server Error
    - Application error
    - Unhandled Runtime Error
