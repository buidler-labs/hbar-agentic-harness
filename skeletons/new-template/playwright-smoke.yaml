# Thin Playwright gate for my-template.
# Copy to playwright/<name>-smoke.yaml and set routes for your app.
# The harness gate checks: server ready, HTTP success per route, console errors, forbidden text.
# Put deep product assertions in the acceptance contract (Tier 3), not here.

name: my-template-smoke
description: Wallet-free smoke routes for my-template.

server:
  command: yarn next:dev
  url: http://localhost:3000
  timeoutMs: 120000

defaults:
  timeoutMs: 60000
  failOnConsoleError: true

routes:
  - name: home
    path: /
  - name: secondary
    path: /REPLACE_ME

forbidden:
  visibleText:
    - Internal Server Error
    - Application error
    - Unhandled Runtime Error
